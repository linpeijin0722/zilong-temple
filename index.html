<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>子龍廟問事系統</title>

  <style>
    body{
      font-family:sans-serif;
      background:#f5f5f5;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card{
      background:white;
      padding:40px;
      border-radius:20px;
      box-shadow:0 0 20px rgba(0,0,0,0.1);
      text-align:center;
    }

    button{
      background:#06C755;
      color:white;
      border:none;
      padding:15px 25px;
      border-radius:10px;
      font-size:18px;
      cursor:pointer;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>子龍廟問事系統</h1>

    <button onclick="lineLogin()">
      使用 LINE 登入
    </button>
  </div>

  <script>
    function lineLogin(){

      const channelId = "2009988101";

      const redirectUri = encodeURIComponent(
        "https://zilong-temple.vercel.app/callback"
      );

      const state = "12345";

      const lineLoginUrl =
        `https://access.line.me/oauth2/v2.1/authorize?` +
        `response_type=code&` +
        `client_id=${channelId}&` +
        `redirect_uri=${redirectUri}&` +
        `state=${state}&` +
        `scope=profile%20openid`;

      window.location.href = lineLoginUrl;
    }
  </script>

</body>
</html>
