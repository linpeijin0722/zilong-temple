<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台北子龍廟 - 問事報名系统</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        /* 宮廟風視覺設計 */
        :root {
            --temple-red: #b22222; 
            --temple-gold: #d4af37; 
            --bg-paper: #fffcf0; 
        }
        body { 
            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif; 
            padding: 20px; 
            background-color: #f4f4f4; 
            display: flex;
            justify-content: center;
        }
        .container { 
            width: 100%;
            max-width: 400px; 
            background: var(--bg-paper); 
            padding: 30px; 
            border-radius: 10px; 
            border: 2px solid var(--temple-gold);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }
        h2 { 
            color: var(--temple-red); 
            text-align: center; 
            margin-bottom: 5px;
            letter-spacing: 2px;
            border-bottom: 2px solid var(--temple-red);
            padding-bottom: 10px;
        }
        .temple-sub {
            text-align: center;
            color: #555;
            font-size: 14px;
            margin-bottom: 25px;
            margin-top: 10px;
        }
        label { display: block; margin-top: 15px; font-weight: bold; color: var(--temple-red); }
        input, select { 
            width: 100%; padding: 12px; margin-top: 5px; 
            box-sizing: border-box; border: 1px solid #ccc; 
            border-radius: 5px; font-size: 16px;
            background-color: white;
        }
        button { 
            width: 100%; padding: 15px; 
            background-color: var(--temple-red);
            color: white; border: none; 
            border-radius: 5px; margin-top: 30px; 
            font-size: 18px; font-weight: bold; cursor: pointer;
        }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #status { text-align: center; color: #888; font-size: 14px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>台北子龍廟</h2>
    <div class="temple-sub">現場問事預約登記</div>
    <div id="status">正在 LINE 登入...請稍後</div>
    
    <form id="appointmentForm" style="display:none;">
        <label>姓名</label>
        <input type="text" id="name" required placeholder="請輸入完整姓名">
        
        <label>電話</label>
        <input type="tel" id="phone" required placeholder="請輸入聯絡電話">
        
        <label>問事項目</label>
        <select id="reason" required>
            <option value="">請選擇問事項目</option>
            <option value="工作">工作</option>
            <option value="收驚">收驚</option>
            <option value="求符令">求符令</option>
            <option value="運勢">運勢</option>
            <option value="感情">感情</option>
            <option value="婚姻">婚姻</option>
            <option value="求子">求子</option>
            <option value="身體">身體</option>
            <option value="學業">學業</option>
            <option value="外靈干擾">外靈干擾</option>
            <option value="修持指引">修持指引</option>
            <option value="其他">其他</option>
        </select>
        
        <label>希望日期</label>
        <select id="bookDate" required>
            <option value="">載入日期中...</option>
        </select>
        
        <button type="submit" id="submitBtn">確認報名</button>
    </form>
</div>

                document.getElementById('status').style.display = 'none';
                document.getElementById('appointmentForm').style.display = 'block';
                fetchDates(); 
            } else {
                liff.login();
            }
        } catch (err) {
            document.getElementById('status').innerText = "系統初始化失敗，請重新開啟";
        }
    }
