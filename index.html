<script>
    const myLiffId = "2009988101-COQJNnc0"; 
    const googleScriptUrl = "https://script.google.com/macros/s/AKfycbyv41qg02k_5EjI2NmAK6Yr_2ER3ItHn_QrLBFCp9HjkdaaKllL56E5O5xn81ZjHqbZ/exec"; 

    async function initializeLiff() {
        try {
            await liff.init({ liffId: myLiffId });
            if (liff.isLoggedIn()) {
                // 1. 先抓取試算表中的日期
                await fetchDates();
                document.getElementById('status').style.display = 'none';
                document.getElementById('appointmentForm').style.display = 'block';
            } else {
                liff.login();
            }
        } catch (err) {
            document.getElementById('status').innerText = "系統初始化失敗";
        }
    }

    // 新增：從 Google 試算表讀取日期
    async function fetchDates() {
        try {
            const response = await fetch(googleScriptUrl);
            const data = await response.json();
            const dateSelect = document.getElementById('bookDate');
            
            // 清空舊選項，只留第一項
            dateSelect.innerHTML = '<option value="">請選擇預約日期</option>';
            
            // 把試算表裡的日期填進去
            data.dates.forEach(date => {
                const opt = document.createElement('option');
                opt.value = date;
                opt.innerText = date;
                dateSelect.appendChild(opt);
            });
        } catch (err) {
            console.error("無法讀取日期", err);
        }
    }

    document.getElementById('appointmentForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "處理中，請稍後...";
        
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const reason = document.getElementById('reason').value;
        const bookDate = document.getElementById('bookDate').value;
        
        try {
            const profile = await liff.getProfile();
            const postData = { name, phone, reason, bookDate, lineId: profile.userId };

            const response = await fetch(googleScriptUrl, {
                method: "POST",
                body: JSON.stringify(postData)
            });
            
            const result = await response.json();
            const message = `【台北子龍廟 問事預約成功】\n\n您的報名順序：第 ${result.orderNum} 號\n\n信士/信女：${name}\n項目：${reason}\n日期：${bookDate}\n\n※請準時前往，祝平安順心。`;

            if (liff.isInClient()) {
                await liff.sendMessages([{ type: 'text', text: message }]);
                alert(`預約成功！您的順序是第 ${result.orderNum} 號。`);
                liff.closeWindow();
            }
        } catch (err) {
            alert("目前連線人數較多，請稍後再試！");
            btn.disabled = false;
            btn.innerText = "確認報名";
        }
    });

    initializeLiff();
</script>
