<script>
    const myLiffId = "2009988101-COQJNnc0"; 
    const googleScriptUrl = "https://script.google.com/macros/s/AKfycbygNrfDnRkOIoblLnZpV8rVJ54K9fvwSaX0B8Lm7KtS7QQf7yLMOipkQHrHK-wkxK9w/exec"; 

    async function initializeLiff() {
        try {
            await liff.init({ liffId: myLiffId });
            if (liff.isLoggedIn()) {
                // 不管日期抓得如何，都要讓表單顯示出來
                fetchDates(); 
                document.getElementById('status').style.display = 'none';
                document.getElementById('appointmentForm').style.display = 'block';
            } else {
                liff.login();
            }
        } catch (err) {
            document.getElementById('status').innerText = "系統初始化失敗，請重新開啟";
        }
    }

    async function fetchDates() {
        try {
            // 設定 5 秒超時，避免 Google 回應太慢導致卡住
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), 5000);

            const response = await fetch(googleScriptUrl, { signal: controller.signal });
            const data = await response.json();
            clearTimeout(id);

            const dateSelect = document.getElementById('bookDate');
            if (data.dates && data.dates.length > 0) {
                dateSelect.innerHTML = '<option value="">請選擇預約日期</option>';
                data.dates.forEach(date => {
                    const opt = document.createElement('option');
                    opt.value = date;
                    opt.innerText = date;
                    dateSelect.appendChild(opt);
                });
            }
        } catch (err) {
            console.error("日期抓取失敗，改用預設選項", err);
            // 如果抓失敗了，這裡可以寫一個保底的預設日期，或是讓它維持原本 HTML 裡的樣子
        }
    }

    document.getElementById('appointmentForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "處理中，請稍後...";
        
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const reason = document.getElementById('reason').value;
        const bookDate = document.getElementById('bookDate').value;
        
        try {
            const profile = await liff.getProfile();
            const postData = { name, phone, reason, bookDate, lineId: profile.userId };

            const response = await fetch(googleScriptUrl, {
                method: "POST",
                body: JSON.stringify(postData)
            });
            
            const result = await response.json();
            const message = `【台北子龍廟 問事預約成功】\n\n您的報名順序：第 ${result.orderNum} 號\n\n信士/信女：${name}\n項目：${reason}\n日期：${bookDate}\n\n※請準時前往，祝平安順心。`;

            if (liff.isInClient()) {
                await liff.sendMessages([{ type: 'text', text: message }]);
                alert(`預約成功！您的順序是第 ${result.orderNum} 號。`);
                liff.closeWindow();
            } else {
                alert("報名成功！\n" + message);
            }
        } catch (err) {
            alert("提交失敗，請檢查網路後再試！");
            btn.disabled = false;
            btn.innerText = "確認報名";
        }
    });

    initializeLiff();
</script>
