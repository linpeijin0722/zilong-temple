<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台北子龍廟 - 問事報名系統</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --temple-red: #b22222; --temple-gold: #d4af37; --bg-paper: #fffcf0; }
        body { font-family: "Microsoft JhengHei", sans-serif; padding: 20px; background-color: #f4f4f4; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; background: var(--bg-paper); padding: 30px; border-radius: 10px; border: 2px solid var(--temple-gold); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: var(--temple-red); text-align: center; margin-bottom: 5px; letter-spacing: 2px; border-bottom: 2px solid var(--temple-red); padding-bottom: 10px; }
        .temple-sub { text-align: center; color: #555; font-size: 14px; margin-bottom: 25px; margin-top: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: var(--temple-red); }
        input, select { width: 100%; padding: 12px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; background-color: white; }
        .hint { font-size: 12px; color: #888; margin-top: 4px; font-weight: normal; }
        button { width: 100%; padding: 15px; background-color: var(--temple-red); color: white; border: none; border-radius: 5px; margin-top: 30px; font-size: 18px; font-weight: bold; cursor: pointer; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #status { text-align: center; color: #888; font-size: 14px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>台北子龍廟</h2>
    <div class="temple-sub">現場問事預約登記</div>
    <div id="status">正在 LINE 登入...</div>
    
    <form id="appointmentForm" style="display:none;">
        <label>姓名</label>
        <input type="text" id="name" required placeholder="請輸入預約人姓名">
        
        <label>電話</label>
        <input type="tel" id="phone" required placeholder="請輸入聯絡電話">
        
        <label>問事項目</label>
        <select id="reason" required>
            <option value="">請選擇問事項目</option>
            <option value="工作">工作</option>
            <option value="收驚">收驚</option>
            <option value="求符令">求符令</option>
            <option value="運勢">運勢</option>
            <option value="感情">感情</option>
            <option value="婚姻">婚姻</option>
            <option value="求子">求子</option>
            <option value="身體">身體</option>
            <option value="學業">學業</option>
            <option value="外靈干擾">外靈干擾</option>
            <option value="修持指引">修持指引</option>
            <option value="其他">其他</option>
        </select>
        
        <label>預約日期</label>
        <select id="bookDate" required>
            <option value="">日期載入中...</option>
        </select>
        <div class="hint">※ 若選項尚未顯示日期，請稍等 1-2 秒載入。</div>
        
        <button type="submit" id="submitBtn">確認報名</button>
    </form>
</div>

<script>
    const myLiffId = "2009988101-COQJNnc0"; 
    // 💡 提示：請確保下面的 Google Script 網址與你最新部署的網址完全一致！
    const googleScriptUrl = "https://script.google.com/macros/s/AKfycbygNrfDnRkOIoblLnZpV8rVJ54K9fvwSaX0B8Lm7KtS7QQf7yLMOipkQHrHK-wkxK9w/exec"; 

    async function initializeLiff() {
        try {
            // 💡 解決安卓卡死核心：加入 withLoginOnStart 讓 LINE 自動接管登入，防止重複 jump 頁面
            await liff.init({ 
                liffId: myLiffId,
                withLoginOnStart: true 
            });
            
            document.getElementById('status').style.display = 'none';
            document.getElementById('appointmentForm').style.display = 'block';
            fetchDates(); 
            
        } catch (err) {
            // 備用機制：若在非 LINE 環境（如一般電腦瀏覽器）開啟也能正常運作
            document.getElementById('status').style.display = 'none';
            document.getElementById('appointmentForm').style.display = 'block';
            fetchDates();
        }
    }

    async function fetchDates() {
        const dateSelect = document.getElementById('bookDate');
        const submitBtn = document.getElementById('submitBtn');
        try {
            const response = await fetch(googleScriptUrl);
            const data = await response.json();
            if (data.dates && data.dates.length > 0) {
                dateSelect.innerHTML = '<option value="">請選擇預約日期</option>';
                data.dates.forEach(date => {
                    const opt = document.createElement('option');
                    opt.value = date;
                    opt.innerText = date;
                    dateSelect.appendChild(opt);
                });
            } else {
                // 💡 如果後端把滿 15 號的日期都篩掉了，陣列變空，代表全部場次都被預約滿了
                dateSelect.innerHTML = '<option value="">本期預約已全數額滿</option>';
                submitBtn.disabled = true;
                submitBtn.innerText = "本期預約已全數額滿";
            }
        } catch (err) {
            dateSelect.innerHTML = '<option value="">載入失敗，請重新整理</option>';
        }
    }

    document.getElementById('appointmentForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "預約傳送中...";
        
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const reason = document.getElementById('reason').value;
        const bookDate = document.getElementById('bookDate').value;
        
        try {
            let userId = "外部瀏覽器用戶";
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                userId = profile.userId;
            }

            const postData = { name, phone, reason, bookDate, lineId: userId };

            const response = await fetch(googleScriptUrl, {
                method: "POST",
                body: JSON.stringify(postData)
            });
            
            const result = await response.json();

            // 如果後端回傳額滿錯誤
            if (result.error) {
                alert(result.error);
                location.reload();
                return;
            }

            // 💡 精準對接：指定要傳送給 LINE 的兩段訊息內容與格式
            const msg1 = "台北子龍廟現場問事預約成功！";
            const msg2 = `您的預約資訊如下：\n預約日期：${bookDate}\n您的報名順序：第 ${result.orderNum} 號\n姓名：${name}\n項目：${reason}`;

            if (liff.isInClient()) {
                // 在 LINE APP 內開啟，發送訊息後自動關閉網頁
                await liff.sendMessages([
                    { type: 'text', text: msg1 },
                    { type: 'text', text: msg2 }
                ]);
                liff.closeWindow();
            } else {
                // 在一般網頁開啟，則跳出提示
                alert("報名成功！\n\n" + msg1 + "\n\n" + msg2);
            }
        } catch (err) {
            alert("系統繁忙，請稍後再試！");
            btn.disabled = false;
            btn.innerText = "確認報名";
        }
    });

    initializeLiff();
</script>
</body>
</html>
